version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meetingrecording.rule=PathPrefix(`/meeting`)"
      - "traefik.http.services.meetingrecording.loadbalancer.server.port=80"
    networks:
      - proxy
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meetingrecording-api.rule=PathPrefix(`/api/meeting`)"
      - "traefik.http.services.meetingrecording-api.loadbalancer.server.port=8000"
    volumes:
      - ./backend/recordings:/app/recordings
    networks:
      - internal
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
  internal:
    driver: bridge
